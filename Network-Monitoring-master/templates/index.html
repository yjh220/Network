<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络入侵检测与防御系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
    <style>
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .module-card {
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-shield-alt"></i> 网络安全系统
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- 系统状态 -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">系统状态</h5>
                        <div class="row">
                            <div class="col-md-3">
                                <div class="d-flex align-items-center">
                                    <div id="statusIndicator" class="rounded-circle bg-danger me-2" style="width: 12px; height: 12px;"></div>
                                    <span id="statusText">系统未运行</span>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <small class="text-muted">运行时间: <span id="uptime">0秒</span></small>
                            </div>
                            <div class="col-md-3">
                                <small class="text-muted">处理包数: <span id="processedPackets">0</span></small>
                            </div>
                            <div class="col-md-3">
                                <small class="text-muted">检测威胁: <span id="detectedThreats">0</span></small>
                            </div>
                        </div>
                        <div class="mt-3">
                            <button id="startBtn" class="btn btn-success btn-sm">
                                <i class="fas fa-play"></i> 启动系统
                            </button>
                            <button id="stopBtn" class="btn btn-danger btn-sm" disabled>
                                <i class="fas fa-stop"></i> 停止系统
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 功能模块 -->
        <div class="row">
            <!-- 原有功能模块 -->
            <div class="col-md-4 mb-4">
                <div class="card card-hover module-card">
                    <div class="card-body text-center">
                        <i class="fas fa-tachometer-alt fa-3x text-primary mb-3"></i>
                        <h5 class="card-title">系统仪表板</h5>
                        <p class="card-text">查看系统整体运行状态和统计信息</p>
                        <a href="/dashboard" class="btn btn-outline-primary">进入</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card card-hover module-card">
                    <div class="card-body text-center">
                        <i class="fas fa-network-wired fa-3x text-info mb-3"></i>
                        <h5 class="card-title">网络监控</h5>
                        <p class="card-text">实时监控网络流量和协议分析</p>
                        <a href="/network_monitor" class="btn btn-outline-info">进入</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card card-hover module-card">
                    <div class="card-body text-center">
                        <i class="fas fa-radar-dish fa-3x text-warning mb-3"></i>
                        <h5 class="card-title">入侵检测</h5>
                        <p class="card-text">基于机器学习的威胁检测分析</p>
                        <a href="/intrusion_detection" class="btn btn-outline-warning">进入</a>
                    </div>
                </div>
            </div>

            <!-- 原有其他模块 -->
            <div class="col-md-4 mb-4">
                <div class="card card-hover module-card">
                    <div class="card-body text-center">
                        <i class="fas fa-clipboard-list fa-3x text-success mb-3"></i>
                        <h5 class="card-title">系统日志</h5>
                        <p class="card-text">查看系统运行日志和事件记录</p>
                        <a href="/logs" class="btn btn-outline-success">进入</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card card-hover module-card">
                    <div class="card-body text-center">
                        <i class="fas fa-cogs fa-3x text-secondary mb-3"></i>
                        <h5 class="card-title">系统设置</h5>
                        <p class="card-text">配置系统参数和运行选项</p>
                        <a href="/settings" class="btn btn-outline-secondary">进入</a>
                    </div>
                </div>
            </div>

            <!-- 新增状态指示卡 -->
            <div class="col-md-4 mb-4">
                <div class="card card-hover module-card">
                    <div class="card-body text-center">
                        <i class="fas fa-heartbeat fa-3x text-danger mb-3"></i>
                        <h5 class="card-title">健康状态</h5>
                        <p class="card-text">检查各模块运行状态和可用性</p>
                        <button id="healthCheckBtn" class="btn btn-outline-danger">检查状态</button>
                        <div id="healthStatus" class="mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4/dist/socket.io.min.js"></script>
    <script>
        // 粒子背景
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = `rgba(0, 212, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(100, Math.floor(canvas.width * canvas.height / 10000));
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 100) {
                        ctx.strokeStyle = `rgba(0, 212, 255, ${0.1 * (1 - distance / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }

        resizeCanvas();
        initParticles();
        animateParticles();
        window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

        const socket = io();
        // ... (原有的 Socket.io 和其它逻辑保持不变)
        // [Existing socket.io and other logic here]
        // 系统状态管理
        let systemStatus = { is_running: false, start_time: null };

        function updateUIStatus(status) {
            systemStatus = status;
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');

            if (status.is_running) {
                indicator.className = 'rounded-circle bg-success me-2';
                indicator.style.width = '12px';
                indicator.style.height = '12px';
                statusText.textContent = '系统运行中';
                startBtn.disabled = true;
                stopBtn.disabled = false;
                if (status.start_time) updateUptime(status.start_time);
            } else {
                indicator.className = 'rounded-circle bg-danger me-2';
                indicator.style.width = '12px';
                indicator.style.height = '12px';
                statusText.textContent = '系统未运行';
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }

            if (status.processed_packets !== undefined) document.getElementById('processedPackets').textContent = status.processed_packets;
            if (status.detected_threats !== undefined) document.getElementById('detectedThreats').textContent = status.detected_threats;
        }

        function updateUptime(startTime) {
            if (!startTime) return;
            const uptime = Math.floor((Date.now() / 1000) - startTime);
            document.getElementById('uptime').textContent = `${uptime}秒`;
        }

        socket.on('connect', function() { console.log('Connected to server'); socket.emit('request_status'); });
        socket.on('system_status', function(status) { updateUIStatus(status); });

        document.getElementById('startBtn').addEventListener('click', function() {
            fetch('/api/start', { method: 'POST' }).then(r => r.json()).then(data => {
                if (data.success) alert('系统启动成功'); else alert('系统启动失败: ' + data.message);
            }).catch(e => { console.error('Error:', e); alert('系统启动失败'); });
        });

        document.getElementById('stopBtn').addEventListener('click', function() {
            fetch('/api/stop', { method: 'POST' }).then(r => r.json()).then(data => {
                if (data.success) {
                    if (data.warning) alert('系统已停止，但' + data.message); else alert('系统停止成功');
                } else alert('系统停止失败: ' + data.message);
            }).catch(e => { console.error('Error:', e); alert('系统停止失败'); });
        });

        document.getElementById('healthCheckBtn').addEventListener('click', function() {
            fetch('/api/health').then(r => r.json()).then(data => {
                const healthStatus = document.getElementById('healthStatus');
                let html = '<div class="text-start">';
                html += `<div>系统运行: <span class="badge ${data.system_running ? 'bg-success' : 'bg-danger'}">${data.system_running ? '是' : '否'}</span></div>`;
                html += `<div>异常检测: <span class="badge ${data.threat_detection_available ? 'bg-success' : 'bg-danger'}">${data.threat_detection_available ? '可用' : '不可用'}</span></div>`;
                html += `<div>模块状态: <span class="badge ${data.modules_initialized ? 'bg-success' : 'bg-warning'}">${data.modules_initialized ? '正常' : '异常'}</span></div>`;
                html += '</div>';
                healthStatus.innerHTML = html;
            }).catch(e => { console.error('Error:', e); document.getElementById('healthStatus').innerHTML = '<div class="text-danger">检查失败</div>'; });
        });

        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/status').then(r => r.json()).then(updateUIStatus).catch(e => console.error('Error fetching status:', e));
        });
    </script>
</body>
</html>
