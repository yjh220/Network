<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Security System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        /* 深色哑光背景 - 增强版 */
        body {
            background:
                radial-gradient(ellipse at 20% 20%, rgba(0, 255, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(138, 43, 226, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 0, 128, 0.05) 0%, transparent 50%),
                linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1126 100%);
            position: relative;
        }

        /* 粒子画布 */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 主要内容层 */
        .content-layer {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 中央标题 - 增强版 */
        .main-title {
            font-size: 4rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(
                90deg,
                #00ffff 0%,
                #0099ff 25%,
                #8a2be2 50%,
                #ff0080 75%,
                #00ffff 100%
            );
            background-size: 400% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 8s ease infinite, fadeIn 2s ease-out;
            text-shadow: 0 0 60px rgba(0, 255, 255, 0.5);
            filter: drop-shadow(0 0 20px rgba(138, 43, 226, 0.4));
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 右上角登录/注册按钮 - 增强版 */
        .auth-buttons {
            position: fixed;
            top: 30px;
            right: 40px;
            z-index: 100;
            display: flex;
            gap: 20px;
        }

        .auth-btn {
            padding: 12px 30px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border-radius: 2px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .auth-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.5s ease;
        }

        .auth-btn:hover::before {
            left: 100%;
        }

        .auth-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow:
                0 0 20px rgba(0, 255, 255, 0.3),
                0 0 40px rgba(138, 43, 226, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .auth-btn.primary {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(138, 43, 226, 0.2));
            border-color: rgba(0, 255, 255, 0.5);
            animation: buttonPulse 3s ease-in-out infinite;
        }

        @keyframes buttonPulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(138, 43, 226, 0.5), 0 0 50px rgba(0, 255, 255, 0.3);
            }
        }

        .auth-btn.primary:hover {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.3), rgba(138, 43, 226, 0.3));
            box-shadow:
                0 0 30px rgba(0, 255, 255, 0.5),
                0 0 60px rgba(138, 43, 226, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            animation: none;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2rem;
                letter-spacing: 0.2em;
            }

            .auth-buttons {
                top: 20px;
                right: 20px;
                flex-direction: column;
                gap: 10px;
            }

            .auth-btn {
                padding: 10px 20px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- 粒子画布 -->
    <canvas id="particles-canvas"></canvas>

    <!-- 主要内容 -->
    <div class="content-layer">
        <h1 class="main-title">NETWORK SECURITY</h1>
    </div>

    <!-- 右上角登录/注册按钮 -->
    <div class="auth-buttons">
        <a href="/login" class="auth-btn">登录</a>
        <a href="/register" class="auth-btn primary">注册</a>
    </div>

    <script>
        /**
         * 粒子系统 - 实现科技感粒子特效和鼠标交互
         */
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        // 设置画布尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 粒子配置 - 增强版
        const config = {
            particleCount: 180,          // 粒子数量（增加）
            connectionDistance: 140,     // 连线距离（增加）
            mouseInfluenceRadius: 180,   // 鼠标影响半径（增加）
            particleSpeed: 0.4,          // 粒子移动速度（增加）
            mouseAttractionStrength: 0.04 // 鼠标吸引强度（增加）
        };

        // 粒子类 - 增强版
        class Particle {
            constructor() {
                this.reset();
                // 为每个粒子分配颜色类型
                this.colorType = Math.random();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * config.particleSpeed;
                this.vy = (Math.random() - 0.5) * config.particleSpeed;
                this.radius = Math.random() * 2.5 + 0.5;
                this.opacity = Math.random() * 0.6 + 0.4;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.02;
            }

            getColor() {
                const time = Date.now() * 0.001;
                const pulse = Math.sin(this.pulsePhase + time * 2) * 0.3 + 0.7;

                if (this.colorType < 0.25) {
                    // 青色
                    return {
                        r: 0,
                        g: Math.floor(255 * pulse),
                        b: Math.floor(255 * pulse)
                    };
                } else if (this.colorType < 0.5) {
                    // 紫色
                    return {
                        r: Math.floor(138 * pulse),
                        g: Math.floor(43 * pulse),
                        b: Math.floor(226 * pulse)
                    };
                } else if (this.colorType < 0.75) {
                    // 粉色
                    return {
                        r: Math.floor(255 * pulse),
                        g: Math.floor(0 * pulse),
                        b: Math.floor(128 * pulse)
                    };
                } else {
                    // 蓝色
                    return {
                        r: Math.floor(0 * pulse),
                        g: Math.floor(150 * pulse),
                        b: Math.floor(255 * pulse)
                    };
                }
            }

            update(mouseX, mouseY, mouseActive) {
                // 脉冲动画
                this.pulsePhase += this.pulseSpeed;

                // 鼠标吸引效果
                if (mouseActive) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < config.mouseInfluenceRadius) {
                        const force = (config.mouseInfluenceRadius - distance) / config.mouseInfluenceRadius;
                        this.vx += dx * force * config.mouseAttractionStrength;
                        this.vy += dy * force * config.mouseAttractionStrength;
                    }
                }

                // 速度衰减（防止过度运动）
                this.vx *= 0.99;
                this.vy *= 0.99;

                // 保持最小运动速度
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed < config.particleSpeed * 0.5) {
                    this.vx += (Math.random() - 0.5) * 0.02;
                    this.vy += (Math.random() - 0.5) * 0.02;
                }

                // 更新位置
                this.x += this.vx;
                this.y += this.vy;

                // 边界检测
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                // 边界限制
                this.x = Math.max(0, Math.min(canvas.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height, this.y));
            }

            draw() {
                const color = this.getColor();
                const pulse = Math.sin(this.pulsePhase) * 0.3 + 0.7;
                const currentRadius = this.radius * (0.8 + pulse * 0.4);

                // 外层发光
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, currentRadius * 4
                );
                gradient.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, ${this.opacity * 0.8})`);
                gradient.addColorStop(0.3, `rgba(${color.r}, ${color.g}, ${color.b}, ${this.opacity * 0.3})`);
                gradient.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius * 4, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 核心粒子
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${this.opacity})`;
                ctx.shadowBlur = 20;
                ctx.shadowColor = `rgba(${color.r}, ${color.g}, ${color.b}, 0.8)`;
                ctx.fill();
                ctx.shadowBlur = 0;

                // 高光
                ctx.beginPath();
                ctx.arc(this.x - currentRadius * 0.3, this.y - currentRadius * 0.3, currentRadius * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.6})`;
                ctx.fill();
            }
        }

        // 创建粒子数组
        const particles = [];
        for (let i = 0; i < config.particleCount; i++) {
            particles.push(new Particle());
        }

        // 鼠标状态
        let mouseX = 0;
        let mouseY = 0;
        let mouseActive = false;
        const mouseTrail = [];
        const maxTrailLength = 20;

        // 鼠标移动事件
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            mouseActive = true;

            // 添加鼠标拖尾
            mouseTrail.push({
                x: mouseX,
                y: mouseY,
                age: 0,
                colorType: Math.random()
            });

            if (mouseTrail.length > maxTrailLength) {
                mouseTrail.shift();
            }
        });

        // 鼠标静止检测
        let mouseInactiveTimer;
        document.addEventListener('mousemove', () => {
            clearTimeout(mouseInactiveTimer);
            mouseInactiveTimer = setTimeout(() => {
                mouseActive = false;
            }, 2000);
        });

        // 绘制粒子间连线 - 增强版
        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < config.connectionDistance) {
                        const opacity = (1 - distance / config.connectionDistance) * 0.5;

                        // 创建渐变连线
                        const gradient = ctx.createLinearGradient(
                            particles[i].x, particles[i].y,
                            particles[j].x, particles[j].y
                        );

                        const color1 = particles[i].getColor();
                        const color2 = particles[j].getColor();

                        gradient.addColorStop(0, `rgba(${color1.r}, ${color1.g}, ${color1.b}, ${opacity})`);
                        gradient.addColorStop(0.5, `rgba(${(color1.r + color2.r) / 2}, ${(color1.g + color2.g) / 2}, ${(color1.b + color2.b) / 2}, ${opacity * 1.2})`);
                        gradient.addColorStop(1, `rgba(${color2.r}, ${color2.g}, ${color2.b}, ${opacity})`);

                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = 1;
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = `rgba(${(color1.r + color2.r) / 2}, ${(color1.g + color2.g) / 2}, ${(color1.b + color2.b) / 2}, 0.5)`;
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    }
                }
            }
        }

        // 绘制鼠标拖尾
        function drawMouseTrail() {
            if (mouseTrail.length < 2) return;

            for (let i = 0; i < mouseTrail.length; i++) {
                const point = mouseTrail[i];
                const alpha = (i / mouseTrail.length) * 0.8;

                let r, g, b;
                if (point.colorType < 0.33) {
                    r = 0; g = 255; b = 255;
                } else if (point.colorType < 0.66) {
                    r = 138; g = 43; b = 226;
                } else {
                    r = 255; g = 0; b = 128;
                }

                // 绘制拖尾粒子
                const gradient = ctx.createRadialGradient(
                    point.x, point.y, 0,
                    point.x, point.y, 8
                );
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${alpha * 0.5})`);
                gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

                ctx.beginPath();
                ctx.arc(point.x, point.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 连接相邻拖尾点
                if (i > 0) {
                    const prevPoint = mouseTrail[i - 1];
                    ctx.beginPath();
                    ctx.moveTo(prevPoint.x, prevPoint.y);
                    ctx.lineTo(point.x, point.y);
                    ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha * 0.5})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }

            // 更新拖尾年龄
            for (let i = mouseTrail.length - 1; i >= 0; i--) {
                mouseTrail[i].age++;
                if (mouseTrail[i].age > 30) {
                    mouseTrail.splice(i, 1);
                }
            }
        }

        // 动画循环
        function animate() {
            // 清除画布（带拖尾效果）
            ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制鼠标拖尾
            drawMouseTrail();

            // 更新和绘制粒子
            particles.forEach(particle => {
                particle.update(mouseX, mouseY, mouseActive);
                particle.draw();
            });

            // 绘制连线
            drawConnections();

            requestAnimationFrame(animate);
        }

        // 启动动画
        animate();
    </script>
</body>
</html>
