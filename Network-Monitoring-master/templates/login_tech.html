<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Creative Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: #0a0a0f;
            position: relative;
        }

        /* 粒子画布 */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 内容层 */
        .content-layer {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 登录容器 */
        .login-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
        }

        .login-title {
            color: #ffffff;
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: #ffffff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(180, 220, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(180, 220, 255, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(180, 220, 255, 0.15), rgba(138, 180, 255, 0.15));
            border: 1px solid rgba(180, 220, 255, 0.25);
            border-radius: 6px;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, rgba(180, 220, 255, 0.25), rgba(138, 180, 255, 0.25));
            border-color: rgba(180, 220, 255, 0.4);
            box-shadow: 0 0 30px rgba(180, 220, 255, 0.2);
            transform: translateY(-2px);
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: rgba(180, 220, 255, 0.7);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: rgba(180, 220, 255, 1);
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .register-link a {
            color: rgba(180, 220, 255, 0.7);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: rgba(180, 220, 255, 1);
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="content-layer">
        <div class="login-container">
            <h1 class="login-title">System Login</h1>
            <form method="POST" action="/login">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-submit">Login</button>
            </form>
            <div class="register-link">
                <a href="/register">Create an account</a>
            </div>
            <div class="back-link">
                <a href="/">← Back to home</a>
            </div>
        </div>
    </div>

    <script>
        // 简化版粒子系统（与首页一致但减少数量）
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const config = {
            particleCount: 80,
            connectionDistance: 130,
            mouseInfluenceRadius: 200,
            particleSpeed: 0.25,
            mouseAttractionStrength: 0.025
        };

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * config.particleSpeed;
                this.vy = (Math.random() - 0.5) * config.particleSpeed;
                this.radius = Math.random() * 1.5 + 0.8;
                this.baseOpacity = Math.random() * 0.4 + 0.3;
                this.opacity = this.baseOpacity;
            }

            update(mouseX, mouseY, mouseActive) {
                if (mouseActive) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < config.mouseInfluenceRadius) {
                        const force = (config.mouseInfluenceRadius - distance) / config.mouseInfluenceRadius;
                        const easeFactor = force * force * (3 - 2 * force);
                        this.vx += dx * easeFactor * config.mouseAttractionStrength;
                        this.vy += dy * easeFactor * config.mouseAttractionStrength;
                        this.opacity = this.baseOpacity + force * 0.4;
                    } else {
                        this.opacity = this.baseOpacity;
                    }
                }

                this.vx *= 0.98;
                this.vy *= 0.98;

                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed < config.particleSpeed * 0.3) {
                    this.vx += (Math.random() - 0.5) * 0.01;
                    this.vy += (Math.random() - 0.5) * 0.01;
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                this.x = Math.max(0, Math.min(canvas.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height, this.y));
            }

            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 4
                );
                gradient.addColorStop(0, `rgba(220, 235, 255, ${this.opacity * 0.8})`);
                gradient.addColorStop(0.4, `rgba(180, 210, 255, ${this.opacity * 0.3})`);
                gradient.addColorStop(1, `rgba(180, 210, 255, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 4, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.shadowBlur = 12;
                ctx.shadowColor = 'rgba(180, 220, 255, 0.6)';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        const particles = [];
        for (let i = 0; i < config.particleCount; i++) {
            particles.push(new Particle());
        }

        let mouseX = 0;
        let mouseY = 0;
        let mouseActive = false;
        let mouseInactiveTimer;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            mouseActive = true;
            clearTimeout(mouseInactiveTimer);
            mouseInactiveTimer = setTimeout(() => {
                mouseActive = false;
            }, 1500);
        });

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < config.connectionDistance) {
                        const opacity = (1 - distance / config.connectionDistance) * 0.25;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(180, 210, 255, ${opacity})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
        }

        let lastTime = 0;
        const targetFPS = 60;
        const frameInterval = 1000 / targetFPS;

        function animate(currentTime) {
            requestAnimationFrame(animate);
            const deltaTime = currentTime - lastTime;
            if (deltaTime < frameInterval) return;
            lastTime = currentTime - (deltaTime % frameInterval);

            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update(mouseX, mouseY, mouseActive);
                particle.draw();
            });

            drawConnections();
        }

        animate(0);
    </script>
</body>
</html>
